name: Deploy

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Structural tests
        run: pnpm test:structural

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy (server)
        run: |
          curl -sf "${{ secrets.RENDER_DEPLOY_HOOK_SERVER }}" \
            || echo "::warning::Server deploy hook not configured"

      - name: Trigger Render deploy (web)
        run: |
          curl -sf "${{ secrets.RENDER_DEPLOY_HOOK_WEB }}" \
            || echo "::warning::Web deploy hook not configured"
